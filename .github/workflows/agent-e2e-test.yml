name: Agent E2E Test

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write
  packages: read

concurrency:
  group: agent-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      agent-changed: ${{ steps.check.outputs.agent-changed }}
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - name: Check if agent-container changed
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF_BASE="origin/${{ github.event.pull_request.base.ref }}"
          else
            DIFF_BASE="HEAD~1"
          fi
          if git diff --name-only "$DIFF_BASE" HEAD | grep -qE '^agent-container/'; then
            echo "agent-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "agent-changed=false" >> "$GITHUB_OUTPUT"
          fi

  happy-path:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || (!github.event.pull_request.draft && !github.event.pull_request.head.repo.fork) }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      QAGENT_VERSION: v0.1.2
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
      COMPOSIO_USER_ID: ${{ secrets.COMPOSIO_USER_ID }}

    steps:
      # ── Checkout & toolchain ────────────────────────────────────
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Resolve agent image tag
        id: agent-image
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "image=ghcr.io/skillfulagents/superagent-agent-container-base:${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate secrets
        run: |
          [ -n "$ANTHROPIC_API_KEY" ] || { echo "::error::Missing ANTHROPIC_API_KEY"; exit 1; }

      - name: Install dependencies
        run: |
          npm ci
          npm install -g @anthropic-ai/claude-code
          git clone --branch "$QAGENT_VERSION" --depth 1 https://github.com/SkillfulAgents/qagent.git /tmp/qagent
          cd /tmp/qagent && npm ci && npm run build && npm link
          npx playwright install ffmpeg

      - name: Verify toolchain
        run: node -v && claude --version && qagent --help

      # ── Docker images ───────────────────────────────────────────
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull agent image
        if: needs.detect-changes.outputs.agent-changed == 'false'
        run: docker pull "${{ steps.agent-image.outputs.image }}"

      - name: Build agent image from source
        if: needs.detect-changes.outputs.agent-changed == 'true'
        run: docker build -t "${{ steps.agent-image.outputs.image }}" ./agent-container

      - name: Set agent image env
        run: echo "AGENT_IMAGE=${{ steps.agent-image.outputs.image }}" >> "$GITHUB_ENV"

      # ── Run ─────────────────────────────────────────────────────
      - name: Build and start SuperAgent
        run: docker compose up -d --build

      - name: Wait for SuperAgent
        run: |
          for i in $(seq 1 90); do
            curl -fsS http://localhost:47891 >/dev/null 2>&1 && echo "Ready." && exit 0
            sleep 2
          done
          echo "::error::SuperAgent did not become ready in time."
          docker compose ps && docker compose logs --no-color
          exit 1

      - name: Run E2E tests
        run: qagent run --project-dir .qagent --filter happy_path/ --model haiku --parallel 3 --headless --record --verbose

      # ── Summary & artifacts ──────────────────────────────────────
      - name: Render results to job summary
        if: always()
        run: |
          SUMMARY=$(find .qagent/results -name summary.json -type f | head -1)
          if [ -z "$SUMMARY" ]; then
            echo "### QAgent Smoke — no results found" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          node -e '
          const fs = require("fs");
          const summary = JSON.parse(fs.readFileSync(process.argv[1], "utf-8"));
          const lines = [];
          const icon = (p) => p ? "✅" : "❌";

          lines.push("## QAgent Smoke Results");
          lines.push("");
          lines.push(`| Metric | Value |`);
          lines.push(`|--------|-------|`);
          lines.push(`| Stories | ${summary.passedStories}/${summary.totalStories} passed |`);
          lines.push(`| Features | ${summary.passedFeatures}/${summary.totalFeatures} passed |`);
          lines.push(`| Duration | ${summary.totalDurationSec.toFixed(1)}s |`);
          lines.push(`| Cost | $${summary.totalCostUsd.toFixed(2)} |`);
          lines.push("");

          for (const story of summary.results) {
            lines.push(`### ${icon(story.passed)} ${story.storyId} (${story.mode})`);
            lines.push(`> ${story.storyName} — ${story.durationSec.toFixed(1)}s · $${story.costUsd.toFixed(2)}`);
            lines.push("");

            if (story.features && story.features.length > 0) {
              lines.push("| Feature | Status | Report |");
              lines.push("|---------|--------|--------|");
              for (const f of story.features) {
                lines.push(`| ${f.feature} | ${icon(f.passed)} | \`${f.reportPath}\` |`);
              }
            } else if (story.reportPath) {
              lines.push(`Report: \`${story.reportPath}\``);
            }

            // inline report details
            const reportDir = require("path").dirname(require("path").join(require("path").dirname(process.argv[1]), story.reportPath || ""));
            const reportFile = require("path").join(require("path").dirname(process.argv[1]), story.reportPath || "");
            try {
              const report = JSON.parse(fs.readFileSync(reportFile, "utf-8"));
              if (report.steps && report.steps.length > 0) {
                lines.push("");
                lines.push("<details><summary>Steps</summary>");
                lines.push("");
                for (const s of report.steps) { lines.push(`- ${s}`); }
                lines.push("");
                lines.push("</details>");
              }
              if (report.bugs && report.bugs.length > 0) {
                lines.push("");
                lines.push("**Bugs found:**");
                for (const b of report.bugs) { lines.push(`- 🐛 ${b}`); }
              }
            } catch {}

            // check for per-feature reports
            if (story.features) {
              for (const f of story.features) {
                try {
                  const fr = JSON.parse(fs.readFileSync(
                    require("path").join(require("path").dirname(process.argv[1]), f.reportPath), "utf-8"));
                  lines.push("");
                  lines.push(`<details><summary>${icon(fr.passed)} ${f.feature} — steps</summary>`);
                  lines.push("");
                  if (fr.reason) lines.push(`**Result:** ${fr.reason}`);
                  lines.push("");
                  for (const s of (fr.steps || [])) { lines.push(`- ${s}`); }
                  if (fr.bugs && fr.bugs.length > 0) {
                    lines.push("");
                    lines.push("**Bugs:**");
                    for (const b of fr.bugs) { lines.push(`- 🐛 ${b}`); }
                  }
                  lines.push("");
                  lines.push("</details>");
                } catch {}
              }
            }
            lines.push("");
          }

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join("\n") + "\n");
          ' "$SUMMARY"

      - name: Collect logs
        if: always()
        run: docker compose logs --no-color > .qagent/results/docker.log 2>/dev/null || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: .qagent/results/
          if-no-files-found: warn
          retention-days: 14

      - name: Stop stack
        if: always()
        run: docker compose down -v --remove-orphans

  deploy-report:
    needs: happy-path
    if: always() && needs.happy-path.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 1
        continue-on-error: true

      - name: Ensure gh-pages branch exists
        run: |
          if ! git rev-parse --verify gh-pages >/dev/null 2>&1; then
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            echo '<html><head><meta charset="utf-8"><title>QAgent Reports</title></head><body><h1>QAgent E2E Reports</h1><ul id="prs"></ul></body></html>' > index.html
            git add index.html
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "init gh-pages"
            git push origin gh-pages
          fi

      - name: Download results artifact
        uses: actions/download-artifact@v4
        with:
          name: e2e-results
          path: _artifact

      - name: Deploy PR report
        env:
          PR_NUM: ${{ github.event.pull_request.number || 'manual' }}
          PR_TITLE: ${{ github.event.pull_request.title || 'Manual run' }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          PR_DIR="pr/${PR_NUM}"
          rm -rf "${PR_DIR}"
          mkdir -p "${PR_DIR}"

          RUN_DIR=$(find _artifact -maxdepth 1 -mindepth 1 -type d | head -1)
          if [ -n "$RUN_DIR" ] && [ -f "$RUN_DIR/index.html" ]; then
            cp -r "$RUN_DIR"/* "${PR_DIR}/"
          else
            echo "<h1>No report generated for PR #${PR_NUM}</h1>" > "${PR_DIR}/index.html"
          fi

          rm -rf _artifact

          # Rebuild index page listing all active PR reports
          cat > index.html << 'INDEXEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>QAgent E2E Reports</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #24292f; }
              h1 { border-bottom: 1px solid #d0d7de; padding-bottom: 12px; }
              ul { list-style: none; padding: 0; }
              li { padding: 8px 12px; margin: 4px 0; background: #f6f8fa; border-radius: 6px; }
              li a { text-decoration: none; color: #0969da; font-weight: 600; }
              li a:hover { text-decoration: underline; }
              .meta { color: #656d76; font-size: 0.9em; margin-left: 8px; }
              .empty { color: #656d76; font-style: italic; }
            </style>
          </head>
          <body>
            <h1>QAgent E2E Reports</h1>
            <ul>
          INDEXEOF

          for pr_path in pr/*/; do
            [ -d "$pr_path" ] || continue
            pr_id=$(basename "$pr_path")
            echo "    <li><a href=\"pr/${pr_id}/\">PR #${pr_id}</a></li>" >> index.html
          done

          cat >> index.html << 'INDEXEOF'
            </ul>
            <p class="meta">Generated by qagent CI</p>
          </body>
          </html>
          INDEXEOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "deploy: PR #${PR_NUM} report (${COMMIT_SHA:0:7})"
          git push origin gh-pages

      - name: Comment report link on PR
        if: github.event.pull_request.number
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = context.payload.pull_request.number;
            const sha = context.sha.slice(0, 7);
            const url = `https://skillfulagents.github.io/SuperAgent/pr/${prNum}/`;
            const marker = '<!-- qagent-report -->';
            const body = `${marker}\n**QAgent E2E Report** for \`${sha}\`: ${url}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
            }
