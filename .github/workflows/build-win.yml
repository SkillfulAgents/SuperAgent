name: Build Windows App

on:
  push:
    branches: [main]

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 11.14.1 = newest npm with min-release-age support (needs >=11.10) where
      # `npm ls --json --long` still works (broken in 11.15+, breaks electron-builder)
      - name: Upgrade npm (pinned)
        run: npm install -g npm@11.14.1

      - name: Install dependencies
        run: npm ci

      - name: Build and sign Windows app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLATFORM_BASE_URL: ${{ secrets.PLATFORM_BASE_URL }}
          PLATFORM_PROXY_URL: ${{ secrets.PLATFORM_PROXY_URL }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_CODE_SIGNING_ENDPOINT: ${{ secrets.AZURE_CODE_SIGNING_ENDPOINT }}
          AZURE_CODE_SIGNING_ACCOUNT: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT }}
          AZURE_CODE_SIGNING_PROFILE: ${{ secrets.AZURE_CODE_SIGNING_PROFILE }}
          AZURE_CODE_SIGNING_PUBLISHER: ${{ secrets.AZURE_CODE_SIGNING_PUBLISHER }}
        run: npm run dist:win

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: Superagent-Windows-${{ github.ref_name }}
          path: release/*.exe
          retention-days: 30

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Superagent-Windows-ZIP-${{ github.ref_name }}
          path: release/*.zip
          retention-days: 30
