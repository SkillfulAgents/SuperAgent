name: Cleanup PR Report

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 1
        continue-on-error: true

      - name: Remove PR report and rebuild index
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          if [ ! -d "pr/${PR_NUM}" ]; then
            echo "No report directory for PR #${PR_NUM}, nothing to clean up."
            exit 0
          fi

          rm -rf "pr/${PR_NUM}"

          cat > index.html << 'INDEXEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>QAgent E2E Reports</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #24292f; }
              h1 { border-bottom: 1px solid #d0d7de; padding-bottom: 12px; }
              ul { list-style: none; padding: 0; }
              li { padding: 8px 12px; margin: 4px 0; background: #f6f8fa; border-radius: 6px; }
              li a { text-decoration: none; color: #0969da; font-weight: 600; }
              li a:hover { text-decoration: underline; }
              .meta { color: #656d76; font-size: 0.9em; margin-left: 8px; }
            </style>
          </head>
          <body>
            <h1>QAgent E2E Reports</h1>
            <ul>
          INDEXEOF

          for pr_path in pr/*/; do
            [ -d "$pr_path" ] || continue
            pr_id=$(basename "$pr_path")
            echo "    <li><a href=\"pr/${pr_id}/\">PR #${pr_id}</a></li>" >> index.html
          done

          cat >> index.html << 'INDEXEOF'
            </ul>
            <p class="meta">Generated by qagent CI</p>
          </body>
          </html>
          INDEXEOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "cleanup: remove PR #${PR_NUM} report"
          git push origin gh-pages
