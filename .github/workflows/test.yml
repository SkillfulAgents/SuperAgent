name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

      - name: Run unit tests with coverage
        run: npx vitest run --coverage

      - name: Coverage summary
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json

  container-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent-container/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: agent-container

      # The SDK's optional deps include both glibc and musl Linux binaries with
      # no libc constraint, so npm installs both on a glibc runner. The SDK's
      # resolver prefers the musl one and then spawn fails with ENOENT (kernel
      # can't load it). Match the Dockerfile workaround.
      - name: Drop musl variant of Claude Code native binary
        run: rm -rf node_modules/@anthropic-ai/claude-agent-sdk-linux-*-musl
        working-directory: agent-container

      - name: Run typecheck
        run: npx tsc --noEmit
        working-directory: agent-container

      - name: Run container tests
        run: npm test
        working-directory: agent-container
        env:
          SDK_TEST_ANTHROPIC_API_KEY: ${{ secrets.SDK_TEST_ANTHROPIC_API_KEY }}

  container-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build container image
        run: docker build -t superagent-container ./agent-container

      - name: Run browser integration tests
        run: ./agent-container/test-browser-integration.sh superagent-container

  e2e-tests:
    name: E2E
    runs-on:
      group: Default
      labels: e2e-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E suites
        env:
          PLAYWRIGHT_WORKERS: ${{ vars.E2E_PLAYWRIGHT_WORKERS || '10' }}
        run: |
          npx concurrently --kill-others-on-fail --names web,stateful,browser,persistence,auth,a11y --prefix "[{name}]" \
            "PORT=3000 SUPERAGENT_DATA_DIR=.e2e-data/web PLAYWRIGHT_WORKERS=$PLAYWRIGHT_WORKERS npm run test:e2e:web -- --fail-on-flaky-tests" \
            "PORT=3001 SUPERAGENT_DATA_DIR=.e2e-data/stateful PLAYWRIGHT_WORKERS=1 npm run test:e2e:stateful -- --fail-on-flaky-tests" \
            "PORT=3002 SUPERAGENT_DATA_DIR=.e2e-data/browser npm run test:e2e:browser -- --fail-on-flaky-tests" \
            "PORT=3003 SUPERAGENT_DATA_DIR=.e2e-data/persistence npm run test:e2e:persistence -- --fail-on-flaky-tests" \
            "PORT=3004 SUPERAGENT_DATA_DIR=.e2e-data/auth npm run test:e2e:auth -- --fail-on-flaky-tests" \
            "PORT=3005 SUPERAGENT_DATA_DIR=.e2e-data/a11y PLAYWRIGHT_WORKERS=1 npm run test:e2e:a11y -- --fail-on-flaky-tests || true"
