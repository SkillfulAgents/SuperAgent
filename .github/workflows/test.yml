name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

      - name: Run unit tests with coverage
        run: npx vitest run --coverage

      - name: Coverage summary
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json

  container-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent-container/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: agent-container

      # The SDK's optional deps include both glibc and musl Linux binaries with
      # no libc constraint, so npm installs both on a glibc runner. The SDK's
      # resolver prefers the musl one and then spawn fails with ENOENT (kernel
      # can't load it). Match the Dockerfile workaround.
      - name: Drop musl variant of Claude Code native binary
        run: rm -rf node_modules/@anthropic-ai/claude-agent-sdk-linux-*-musl
        working-directory: agent-container

      - name: Run typecheck
        run: npx tsc --noEmit
        working-directory: agent-container

      - name: Run container tests
        run: npm test
        working-directory: agent-container
        env:
          SDK_TEST_ANTHROPIC_API_KEY: ${{ secrets.SDK_TEST_ANTHROPIC_API_KEY }}

  container-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build container image
        run: docker build -t superagent-container ./agent-container

      - name: Run browser integration tests
        run: ./agent-container/test-browser-integration.sh superagent-container

  e2e-tests:
    runs-on: e2e-runner-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Wizard E2E suite
        env:
          PORT: '3000'
          SUPERAGENT_DATA_DIR: .e2e-data/wizard
          PLAYWRIGHT_OUTPUT_DIR: test-results/wizard
          PLAYWRIGHT_HTML_REPORT: playwright-report/wizard
        run: npm run test:e2e:wizard

      - name: Run Playwright E2E suites
        env:
          PORT: '3000'
          SUPERAGENT_DATA_DIR: .e2e-data/web
          PLAYWRIGHT_WORKERS: '2'
          PLAYWRIGHT_OUTPUT_DIR: test-results/web
          PLAYWRIGHT_HTML_REPORT: playwright-report/web
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-playwright-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  e2e-auth-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Auth E2E tests
        env:
          PORT: '3001'
          SUPERAGENT_DATA_DIR: .e2e-data/auth
          PLAYWRIGHT_OUTPUT_DIR: test-results/auth
          PLAYWRIGHT_HTML_REPORT: playwright-report/auth
        run: npm run test:e2e:auth

      - name: Upload auth Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-auth-playwright-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  e2e-a11y-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run a11y audit
        continue-on-error: true
        env:
          PORT: '3000'
          SUPERAGENT_DATA_DIR: .e2e-data/a11y
          PLAYWRIGHT_WORKERS: '1'
          PLAYWRIGHT_OUTPUT_DIR: test-results/a11y
          PLAYWRIGHT_HTML_REPORT: playwright-report/a11y
        run: npm run test:e2e:a11y

      - name: Upload a11y Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-a11y-playwright-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
