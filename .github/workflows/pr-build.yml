name: PR Build

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  build-mac:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decode Apple API Key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
        run: |
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > /tmp/AuthKey.p8
          echo "APPLE_API_KEY=/tmp/AuthKey.p8" >> $GITHUB_ENV

      - name: Build and sign macOS app
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:mac

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: Superagent-macOS-DMG
          path: release/*.dmg
          retention-days: 14

      - name: Upload macOS ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Superagent-macOS-ZIP
          path: release/*.zip
          retention-days: 14

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: Superagent-Windows-Setup
          path: release/*.exe
          retention-days: 14

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Superagent-Windows-ZIP
          path: release/*.zip
          retention-days: 14

  comment:
    runs-on: ubuntu-latest
    needs: [build-mac, build-win]
    if: always()
    steps:
      - name: Post PR comment with download links
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const macResult = '${{ needs.build-mac.result }}';
            const winResult = '${{ needs.build-win.result }}';

            const macStatus = macResult === 'success' ? '✅' : '❌';
            const winStatus = winResult === 'success' ? '✅' : '❌';

            const body = [
              `## 🏗️ PR Build`,
              ``,
              `| Platform | Status |`,
              `|----------|--------|`,
              `| macOS (DMG + ZIP) | ${macStatus} ${macResult} |`,
              `| Windows (Installer + ZIP) | ${winStatus} ${winResult} |`,
              ``,
              `**[⬇️ Download artifacts from this workflow run](${runUrl}#artifacts)**`,
              ``,
              `<sub>Artifacts are retained for 14 days. You must be signed into GitHub to download.</sub>`,
            ].join('\n');

            // Find existing bot comment to update (sticky comment)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## 🏗️ PR Build';
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
