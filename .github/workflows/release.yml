name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # Extract version + update channel from tag
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.version.outputs.channel }}
    steps:
      - name: Extract version + channel from tag
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          # Channel = the prerelease identifier (rc/beta/alpha) so electron-builder
          # writes rc-*.yml for prereleases and latest-*.yml for stable. Matches the
          # app's runtime autoUpdater.channel derivation in auto-updater.ts.
          if [[ "$GITHUB_REF_NAME" =~ -([a-zA-Z]+) ]]; then
            echo "channel=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "channel=latest" >> $GITHUB_OUTPUT
          fi

  # Build and push agent container with version tag
  build-agent-container:
    runs-on: ubuntu-latest
    needs: prepare
    env:
      IMAGE_NAME: ${{ github.repository_owner }}/superagent-agent-container-base
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push container image
        uses: docker/build-push-action@v7
        with:
          context: ./agent-container
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build and push app containers with version tags (regular + auth)
  build-app-container:
    runs-on: ubuntu-latest
    needs: prepare
    env:
      IMAGE_NAME: ${{ github.repository_owner }}/superagent

    strategy:
      matrix:
        include:
          - auth_mode: "false"
            tag_suffix: ""
          - auth_mode: "true"
            tag_suffix: "-auth"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},suffix=${{ matrix.tag_suffix }}
            type=semver,pattern={{major}}.{{minor}},suffix=${{ matrix.tag_suffix }}
          flavor: |
            latest=false

      - name: Build and push container image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: AUTH_MODE=${{ matrix.auth_mode }}
          cache-from: type=gha,scope=app-${{ matrix.auth_mode }}
          cache-to: type=gha,mode=max,scope=app-${{ matrix.auth_mode }}

  # Build macOS Electron app (signed + notarized)
  build-mac:
    runs-on: macos-26
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Upgrade npm (min-release-age support)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Decode Apple API Key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
        run: |
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > /tmp/AuthKey.p8
          echo "APPLE_API_KEY=/tmp/AuthKey.p8" >> $GITHUB_ENV

      # Write the update channel into package.json's build.publish.channel via
      # Node (value comes from an env var, never a CLI arg) so it can't be mangled
      # by Windows arg-passing — the `-c.publish.channel=` electron-builder flag
      # got split into `-c .publish.channel=rc` through npm -> cmd.exe -> the
      # electron-builder.cmd shim and was read as a config-file path (SUP-283).
      - name: Set update channel
        shell: bash
        env:
          UPDATE_CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          node -e "const fs=require('fs'),p=require('./package.json');p.build.publish.channel=process.env.UPDATE_CHANNEL;fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          echo "build.publish.channel set to $UPDATE_CHANNEL"

      - name: Build and sign macOS app
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLATFORM_BASE_URL: ${{ secrets.PLATFORM_BASE_URL }}
          PLATFORM_PROXY_URL: ${{ secrets.PLATFORM_PROXY_URL }}
        run: npm run dist:mac

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-release-artifacts
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml
            release/*.yaml
            release/*.blockmap
          retention-days: 5

  # Build Windows Electron app
  build-win:
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Upgrade npm (min-release-age support)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # See build-mac: set the channel via Node from an env var so Windows
      # arg-passing can't mangle a `-c.publish.channel=` CLI flag (SUP-283).
      - name: Set update channel
        shell: bash
        env:
          UPDATE_CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          node -e "const fs=require('fs'),p=require('./package.json');p.build.publish.channel=process.env.UPDATE_CHANNEL;fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          echo "build.publish.channel set to $UPDATE_CHANNEL"

      - name: Build and sign Windows app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLATFORM_BASE_URL: ${{ secrets.PLATFORM_BASE_URL }}
          PLATFORM_PROXY_URL: ${{ secrets.PLATFORM_PROXY_URL }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_CODE_SIGNING_ENDPOINT: ${{ secrets.AZURE_CODE_SIGNING_ENDPOINT }}
          AZURE_CODE_SIGNING_ACCOUNT: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT }}
          AZURE_CODE_SIGNING_PROFILE: ${{ secrets.AZURE_CODE_SIGNING_PROFILE }}
          AZURE_CODE_SIGNING_PUBLISHER: ${{ secrets.AZURE_CODE_SIGNING_PUBLISHER }}
        run: npm run dist:win

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-release-artifacts
          path: |
            release/*.exe
            release/*.zip
            release/*.yml
            release/*.yaml
            release/*.blockmap
          retention-days: 5

  # Create GitHub Release with all artifacts
  create-release:
    runs-on: ubuntu-latest
    needs: [prepare, build-agent-container, build-app-container, build-mac, build-win]
    # Mapped from the secret so the R2 upload step can self-gate on its presence
    # (the `secrets` context isn't available in a step `if:` condition).
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-release-artifacts
          path: ./release-artifacts

      - name: Download win artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-release-artifacts
          path: ./release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Superagent ${{ needs.prepare.outputs.version }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            ./release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --repo "$GITHUB_REPOSITORY"

      # Dual-publish bridge (SUP-286): populate the owned R2 feed
      # (updates.gamutagents.com) AFTER the GitHub release is published, so a
      # transient R2 hiccup can never block the primary (GitHub) feed during the
      # bridge. continue-on-error keeps a failed upload from failing the release —
      # generic-feed builds update from R2; pre-generic clients keep updating from
      # GitHub until the cutover subtask (SUP-287) retires the GitHub feed. Skipped
      # if the Cloudflare credentials aren't configured. Uses the same
      # CLOUDFLARE_API_TOKEN as the gamut-releases Worker deploy — no separate R2
      # S3 keys to manage.
      - name: Upload release feed to Cloudflare R2
        if: ${{ env.CLOUDFLARE_ACCOUNT_ID != '' }}
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          shopt -s nullglob
          for f in ./release-artifacts/*; do
            name="$(basename "$f")"
            # builder-debug.yml is electron-builder's debug dump, not a feed file.
            [ "$name" = "builder-debug.yml" ] && continue
            echo "→ R2: $name"
            npx --yes wrangler@4 r2 object put "gamut-releases/$name" --file "$f" --remote
          done
