services:
  superagent:
    image: ${SUPERAGENT_IMAGE:-ghcr.io/iddogino/superagent:main}
    build:
      context: .
      args:
        AUTH_MODE: ${AUTH_MODE:-false}
    # Host networking is required for DooD (Docker-outside-of-Docker) on Linux.
    # Agent containers publish ports on the host, and the main app connects to
    # them via 127.0.0.1. Without host networking, 127.0.0.1 inside the main
    # container is its own loopback, not the host's.
    network_mode: host
    volumes:
      # DooD - mount Docker socket for sibling container creation
      - /var/run/docker.sock:/var/run/docker.sock
      # Data directory - use ~/.superagent with identical path mapping
      - ${HOME}/.superagent:${HOME}/.superagent
      # Agent container source for building agent image
      - ./agent-container:/app/agent-container:ro
    environment:
      - SUPERAGENT_DATA_DIR=${HOME}/.superagent
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=47891
      # Auth mode (requires building with AUTH_MODE=true)
      - AUTH_MODE=${AUTH_MODE:-false}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-}
      - TRUSTED_ORIGINS=${TRUSTED_ORIGINS:-}
