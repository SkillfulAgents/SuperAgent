<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
  <title>Gamut</title>
  <meta name="description" content="Run sophisticated AI code agents powered by Claude Code" />
  <!-- PWA / "Add to Home Screen": run fullscreen (no Safari chrome) with the Electron app icon -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Gamut" />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <script>
    if (!window.electronAPI) {
      var favicon = document.createElement('link')
      favicon.rel = 'icon'
      favicon.href = '/api/favicon'
      favicon.setAttribute('data-managed-favicon', 'true')
      document.head.appendChild(favicon)
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
