id: agent-chat
name: "Create agent, send message, verify response"
mode: happy-path
baseUrl: http://localhost:47891
features:
  - agent-create
  - session-chat
setup:
  - ensureSecrets
  - ensureAgent
teardown:
  - deleteAgent
steps: |
  1. Navigate to http://localhost:47891.
  2. Find the "{{agentName}}" agent in the sidebar, click it.
  3. Verify agent status is "running" or "idle".
  4. Send message: "Hello! What is 2+2?"
  5. Wait up to 3 minutes for a response.
  6. Verify the response mentions "4". Take a screenshot.
